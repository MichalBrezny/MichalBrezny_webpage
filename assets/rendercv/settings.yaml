# for details on settings, see https://docs.rendercv.com/user_guide/yaml_input_structure/settings/
rendercv_settings:
  render_command:
    # Paths must be relative to _data/cv.yaml
    design: ../assets/rendercv/design.yaml
    locale: ../assets/rendercv/locale.yaml
    typst_path: ../assets/rendercv/rendercv_output/Brezny_CV_EN.typ
    pdf_path: ../assets/rendercv/rendercv_output/Brezny_CV_EN.pdf
    markdown_path: ../assets/rendercv/rendercv_output/Brezny_CV_EN.md
    html_path: ../assets/rendercv/rendercv_output/Brezny_CV_EN.html
    png_path: ../assets/rendercv/rendercv_output/Brezny_CV_EN.png
    dont_generate_markdown: true
    dont_generate_html: true
    dont_generate_pdf: false
    dont_generate_png: true
  bold_keywords: []
